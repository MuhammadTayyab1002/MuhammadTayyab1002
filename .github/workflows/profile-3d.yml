name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 18 * * *"   # daily
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/profile-3d.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important for git operations

      - name: Generate 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: MuhammadTayyab1002

      - name: Publish to output branch
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mv profile-3d-contrib /tmp/profile-3d-contrib || true

          # Handle output branch safely
          if git ls-remote --exit-code --heads origin output > /dev/null 2>&1; then
            git fetch origin output
            git checkout -B output origin/output
          else
            git checkout --orphan output
            git rm -rf . --ignore-unmatch
          fi

          rm -rf profile-3d-contrib
          cp -r /tmp/profile-3d-contrib profile-3d-contrib

          git add profile-3d-contrib
          if git diff --quiet --cached; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: refresh 3d contribution graph"
          git push origin output --force-with-lease